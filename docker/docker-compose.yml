services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ../python
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "${API_PORT}:8000"
    depends_on:
      - db
    volumes:
      - ../python:/app

volumes:
  pgdata:
